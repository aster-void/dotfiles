add_newline = true

[character] # 設定対象のモジュール名は 'character'
# success_symbol = '[>](bold green)' # セグメント 'success_symbol' を '➜' 配色 'bold green' (太字の緑色) に設定
# error_symbol= '[x](bold red)' # セグメント 'success_symbol' を '➜' 配色 'bold green' (太字の緑色) に設定

[golang]
symbol = ' '
style = 'cyan'

[rust]
symbol = ' '

[gleam]
# symbol = ' '
symbol = ' '

[c]
symbol = ' '
style="bold blue"

[python]
symbol = '[p](blue)[y](yellow) '

[nix_shell]
format = 'on [$symbol$state( \($name\))]($style) '
symbol = '󱄅 ' 


[git_status]
format = '([< $ahead_behind $all_status>]($style) )'
style ="yellow"

conflicted = "<=>"
ahead = "^"
behind = "v"
stashed = "stash"
modified = "*"
staged = "+"
renamed = ">"
deleted = "d"

[directory]
truncation_length = 4
read_only = " [readonly]"
read_only_style = "yellow bold"
repo_root_style = "blue"
