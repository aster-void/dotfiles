[language-server]
astro-ls = { command = "astro-ls", args = ["--stdio"] }
biome = { command = "biome", args = ["lsp-proxy"] }
rust-analyzer.config = { checkOnSave.command = "clippy" }
tailwind = { command = "tailwindcss-language-server", args = ["--stdio"] }
vscode-css = { command = "vscode-css-language-server", args = ["--stdio"] }
ts = { command = "typescript-language-server", args = ["--stdio"] }
js = { command = "javascript-typescript-langserver", args = ["--stdio"] }
deno = { command = "deno", args = ["lsp"] }

[[language]]
name = "nix"
auto-format = true
formatter.command = "alejandra"
language-servers = ["nil", "nixd"]

[[language]]
name = "rust"
auto-format = true
language-servers = ["rust-analyzer"]

[[language]]
name = "clangd"
auto-format = true
scope = ".c"
file-types = ["C"]

[[language]]
name = "fsharp"
auto-format = true

[[language]]
name = "toml"
auto-format = true
formatter.command = "taplo"
formatter.args = ["fmt", "-"]


[[langugage]]
name = "go"
auto-format = true

[[langugage]]
name = "gleam"
auto-format = true


[[language]]
name = "markdown"
auto-format = true

[[language]]
name = "mdx"
file-types = ["mdx"]
scope = ".mdx"
language-servers = ["markdown-oxide"]


[[language]]
name = "html"
language-servers = ["tailwind", "vscode-html-language-server"]

[[language]]
name = "css"
file-types = ["css", "scss", "less"]
language-servers = ["vscode-css-language-server", "tailwind"]

[[language]]
name = "less"
scope = "source.less"
file-types = ["less"]
language-servers = ["vscode-css-language-server"]
grammar = "css"

[[language]]
name = "javascript"
auto-format = true
language-servers = ["js"]

[[language]]
name = "typescript"
auto-format = true
formatter = { command = "biome", args = [
  "--stdin",
  "--stdin-file-path",
  "source.ts",
] }
language-servers = [{ name = "ts", except-features = ["format"] }, "biome"]

[[language]]
name = "tsx"
auto-format = true
formatter = { command = "biome", args = ["--stdin-file-path", "a.tsx"] }
language-servers = ["ts", "biome", "tailwind"]

[[language]]
name = "svelte"
auto-format = true
# formatter = { command = "deno", args = ["fmt", "-"] }
language-servers = ["svelteserver", "deno", "tailwind"]

[[language]]
name = "astro"
scope = "source.astro"
injection-regex = "astro"
file-types = ["astro"]
roots = ["package.json", "astro.config.mjs"]
language-servers = ["tailwind", "astro-ls"]
