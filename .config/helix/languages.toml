[language-server]
astro-ls = { command = "astro-ls", args = ["--stdio"] }
biome = { command = "biome", args = ["lsp-proxy"] }
rust-analyzer.config = { checkOnSave.command = "clippy" }
tailwindcss-language-server = { command = "tailwindcss-language-server", args = [
  "--stdio",
] }
vscode-css-language-server = { command = "vscode-css-language-server", args = [
  "--stdio",
] }

[[language]]
name = "nix"
auto-format = true
formatter.command = "alejandra"
language-servers = ["nil", "nixd"]

[[language]]
name = "rust"
auto-format = true
language-servers = ["rust-analyzer"]

[[language]]
name = "clangd"
auto-format = true
scope = ".c"
file-types = ["C"]

[[language]]
name = "fsharp"
auto-format = true

# [language.config.inlayHints]
# bindingModeHints.enable = true
# chainingHints.enable = true
# closingBraceHints.enable = true
# closingBraceHints.minLines = 1
# closureCaptureHints.enable = true
# closureReturnTypeHints.enable = "always"
# expressionAdjustmentHints.enable = true
# rangeExclusiveHints.enable = true

[[language]]
name = "toml"
auto-format = true
formatter.command = "taplo"
formatter.args = ["fmt", "-"]


[[langugage]]
name = "go"
auto-format = true

[[langugage]]
name = "gleam"
auto-format = true


[[language]]
name = "markdown"
auto-format = true

[[language]]
name = "mdx"
file-types = ["mdx"]
scope = ".mdx"
language-servers = ["markdown-oxide"]


[[language]]
name = "html"
language-servers = [
  "tailwindcss-language-server",
  "vscode-html-language-server",
]

[[language]]
name = "css"
language-servers = ["vscode-css-language-server", "tailwindcss-language-server"]

[[language]]
name = "javascript"
auto-format = true

[[language]]
name = "typescript"
auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
]

[[language]]
name = "tsx"
# auto-format = true
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "tailwindcss-language-server",
  "biome",
]

# [[language]]
# name = "tailwindcss"
# scope = "source.svelte" # whats this?

# auto-format = true
# roots = ["tailwind.config.js", "tailwind.config.ts"]
# language-servers = ["tailwindcss-language-server"]

[[language]]
name = "svelte"
auto-format = true
language-servers = ["svelteserver", "tailwindcss-language-server"]

[[language]]
name = "astro"
scope = "source.astro"
injection-regex = "astro"
file-types = ["astro"]
roots = ["package.json", "astro.config.mjs"]
language-servers = ["tailwindcss-language-server", "astro-ls"]
