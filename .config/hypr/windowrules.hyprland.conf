# Window Rules
# windowrulev2 = opacity 0.55, focus:0
windowrulev2 = opacity 1, class: .*
windowrulev2 = opacity 0.85, class: ^(kitty)$, focus:1
windowrulev2 = opacity 0.85, class: ^(Alacritty)$, focus:1
windowrulev2 = noblur, class: ^[^(kitty)]$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
