# execute background processes at launch
# UWSM manages the session and XDG autostart automatically

# UWSM handles dbus activation automatically, but we can ensure it's set
exec-once = dbus-update-activation-environment --systemd --all

# Launch background services with uwsm app
exec-once = uwsm app -- waybar
exec-once = uwsm app -- fcitx5
exec-once = uwsm app -- hyprpaper  
exec-once = uwsm app -- dunst
exec-once = uwsm app -- hypridle

# execute apps at launch with uwsm app
exec-once = [workspace 1 silent] uwsm app -- kitty
exec-once = [workspace 2 silent] uwsm app -- zen-beta # firefox
exec-once = [workspace 3 silent] uwsm app -- discord # legcord can't do ctl+T, vesktop don't even launch
exec-once = [workspace 4 silent] uwsm app -- slack
# exec-once = [workspace 4 silent] uwsm app -- discord # this doesn't launch discord at ws 4
# exec-once = [workspace 5 silent] uwsm app -- kitty cmus 
# exec-once = [workspace 5 silent] uwsm app -- kitty cava
exec-once = hyprctl dispatch workspace 1
