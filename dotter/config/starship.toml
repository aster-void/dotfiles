#add_newline = false

[line_break]
disabled = false

[hostname]
ssh_only = true
style = "bg:#3b4252"
format = '[ $hostname ]($style)'
disabled = false

[os]
style = "bg:#2e3440"
disabled = false     # Disabled by default

[os.symbols]
